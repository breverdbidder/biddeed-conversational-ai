<style>
/* ═══════════════════════════════════════════════════════════════════════
   HOUSE BRAND TOKENS — breverdbidder/zonewise-web
   globals.css + tailwind.config.ts + docs/BRAND_COLORS.md
   Last updated: 2026-03-05 · V3
   ═══════════════════════════════════════════════════════════════════════ */
:root {
  /* Navy scale */
  --navy-900: #07111C;
  --navy-800: #0F2035;
  --navy-700: #162D4A;
  --navy-600: #1E3A5F; /* PRIMARY */
  --navy-500: #2A4F7A;
  --navy-400: #4A6F9A;
  --navy-300: #7099C0;
  --navy-200: #9DC6E0;
  --navy-100: #C5DFEF;
  --navy-50:  #E8F4FD;
  /* Orange */
  --orange:   #F59E0B; /* PRIMARY ACCENT / CTA */
  --orange-5: #D97706;
  --orange-6: #B45309;
  --orange-bg:#FEF3C7;
  /* Cyan secondary */
  --cyan: #03B3CB;
  /* Slate */
  --bg:      #020617; /* slate-950 */
  --bg-2:    #0f172a;
  --bg-3:    #1e293b;
  --sl-700:  #334155;
  --sl-600:  #475569;
  --sl-500:  #64748b;
  --sl-400:  #94a3b8;
  --sl-300:  #cbd5e1;
  --sl-200:  #e2e8f0;
  --sl-100:  #f1f5f9;
  /* Status — BRAND_COLORS.md */
  --bid:    #10B981;
  --review: #F59E0B;
  --skip:   #EF4444;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--sl-200);
  -webkit-font-smoothing: antialiased;
}

/* ── SCROLLBAR ────────────────────────────────────────────── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--navy-700); border-radius: 2px; }

/* ── LAYOUT ───────────────────────────────────────────────── */
.app { display: flex; flex-direction: column; height: 100vh; }

/* ── TOPBAR ───────────────────────────────────────────────── */
.topbar {
  height: 54px;
  background: var(--navy-900);
  border-bottom: 1px solid var(--navy-700);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; flex-shrink: 0;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--navy-600); border: 1px solid var(--navy-500);
  display: flex; align-items: center; justify-content: center;
}
.brand-icon svg { display: block; }
.brand-name { display: flex; align-items: baseline; gap: 1px; font-size: 15px; font-weight: 800; letter-spacing: -0.02em; }
.brand-name .bd { color: #fff; }
.brand-name .ai { color: var(--orange); }
.brand-tag {
  padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
  background: rgba(30,58,95,0.4); border: 1px solid var(--navy-600);
  color: var(--navy-300); letter-spacing: 0.08em;
}

.auction-pills { display: flex; gap: 8px; align-items: center; }
.pill {
  padding: 3px 10px; border-radius: 20px; font-size: 11px;
  font-weight: 700; letter-spacing: 0.06em;
}
.pill-bid    { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: var(--bid); }
.pill-review { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: var(--review); }
.pill-skip   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.2);  color: var(--skip); }
.pill-date   { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--sl-700); margin-left: 4px; }
.live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--bid);
  animation: livePulse 2s ease-in-out infinite;
}
@keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

.everest-tag {
  padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: 600;
  background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25);
  color: var(--orange); letter-spacing: 0.06em;
}

/* ── BODY ─────────────────────────────────────────────────── */
.body { flex: 1; display: flex; overflow: hidden; }

/* ── LEFT SIDEBAR ─────────────────────────────────────────── */
.sidebar {
  width: 216px; background: var(--navy-900);
  border-right: 1px solid var(--navy-700);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar-header {
  padding: 12px 14px 8px; font-size: 10px; font-weight: 600;
  color: var(--navy-600); letter-spacing: 0.15em; text-transform: uppercase;
  border-bottom: 1px solid rgba(22,45,74,0.6);
}
.prop-list { flex: 1; overflow-y: auto; }

.prop-row {
  display: block; width: 100%; text-align: left; background: none;
  border: none; cursor: pointer; padding: 10px 14px;
  border-left: 2px solid transparent; transition: all 0.15s;
  font-family: inherit;
}
.prop-row:hover { background: rgba(30,58,95,0.06); }
.prop-row.active { border-left-color: var(--row-color); background: rgba(30,58,95,0.12); }
.prop-row-top { display: flex; justify-content: space-between; gap: 6px; margin-bottom: 3px; }
.prop-row-addr { font-weight: 600; font-size: 12px; color: var(--sl-400); line-height: 1.3; flex: 1; }
.prop-row.active .prop-row-addr { color: #fff; }
.prop-row-dec { font-size: 9px; font-weight: 800; letter-spacing: 0.1em; flex-shrink: 0; padding-top: 2px; }
.prop-row-bot { display: flex; justify-content: space-between; }
.prop-row-city { font-size: 11px; color: var(--sl-700); }
.prop-row-bid { font-size: 11px; font-weight: 700; color: var(--sl-700); }
.prop-row.active .prop-row-bid { color: var(--orange); }

/* AI pipeline footer */
.pipeline-footer {
  padding: 12px 14px;
  border-top: 1px solid rgba(22,45,74,0.6);
}
.pipeline-label {
  font-size: 9px; font-weight: 600; color: var(--navy-700);
  letter-spacing: 0.15em; margin-bottom: 8px;
}
.pipeline-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.pipeline-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.pipeline-name { font-size: 11px; color: var(--navy-600); }

/* ── CHAT CENTER ──────────────────────────────────────────── */
.chat {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
}
.messages {
  flex: 1; overflow-y: auto; padding: 24px 24px 0;
  display: flex; flex-direction: column; gap: 18px;
}
.message { display: flex; gap: 10px; align-items: flex-start; }
.message.user { flex-direction: row-reverse; }
.avatar {
  width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; color: #fff; letter-spacing: 0.04em;
}
.avatar-ai { background: linear-gradient(135deg, var(--navy-700), var(--navy-600)); border: 1px solid var(--navy-600); }
.avatar-user { background: linear-gradient(135deg, var(--navy-600), var(--navy-500)); border: 1px solid var(--navy-500); }
.bubble {
  max-width: 76%; padding: 11px 15px;
  font-size: 13.5px; line-height: 1.7; color: var(--sl-400);
}
.bubble-ai {
  background: rgba(15,32,53,0.5); border: 1px solid rgba(22,45,74,0.6);
  border-radius: 3px 10px 10px 10px;
}
.bubble-user {
  background: rgba(30,58,95,0.3); border: 1px solid rgba(30,58,95,0.5);
  border-radius: 10px 3px 10px 10px;
}
.bubble strong { color: var(--sl-100); font-weight: 700; }
.bubble code {
  background: var(--navy-700); color: var(--cyan);
  padding: 1px 5px; border-radius: 4px; font-size: 0.88em;
  font-family: 'JetBrains Mono', monospace;
}

/* typing dots */
.typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
.typing-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--navy-400);
}
.typing-dot:nth-child(1) { animation: tdot 1.2s ease-in-out 0s infinite; }
.typing-dot:nth-child(2) { animation: tdot 1.2s ease-in-out 0.2s infinite; }
.typing-dot:nth-child(3) { animation: tdot 1.2s ease-in-out 0.4s infinite; }
@keyframes tdot { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }

/* ── CHIPS ────────────────────────────────────────────────── */
.chips { padding: 14px 24px 0; display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  background: var(--navy-800); border: 1px solid var(--navy-700);
  color: var(--sl-600); padding: 5px 13px; border-radius: 20px;
  font-size: 12px; font-weight: 500; white-space: nowrap;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.chip:hover { background: var(--navy-700); border-color: var(--navy-600); color: var(--sl-400); }

/* ── INPUT BAR ────────────────────────────────────────────── */
.input-area { padding: 12px 24px 16px; }
.input-wrap {
  display: flex; align-items: flex-end; gap: 10px;
  background: var(--navy-800); border: 1px solid var(--navy-700);
  border-radius: 10px; padding: 11px 13px;
}
.input-wrap:focus-within { border-color: var(--navy-500); }
#chat-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--sl-200); font-size: 13.5px; line-height: 1.6;
  font-family: inherit; resize: none; max-height: 120px;
  overflow-y: auto; min-height: 22px;
}
#chat-input::placeholder { color: var(--sl-700); }
.send-btn {
  width: 34px; height: 34px; border-radius: 7px; flex-shrink: 0;
  background: var(--navy-600); border: 1px solid var(--navy-500);
  color: #fff; font-size: 17px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: background 0.15s;
  font-family: inherit;
}
.send-btn:hover:not(:disabled) { background: var(--navy-500); }
.send-btn:disabled { opacity: 0.25; cursor: default; }
.input-footer {
  text-align: center; margin-top: 7px; font-size: 10px; color: var(--navy-800);
}

/* ── RIGHT DETAIL PANEL ───────────────────────────────────── */
.detail-panel {
  width: 334px; background: var(--navy-900);
  border-left: 1px solid var(--navy-700);
  flex-shrink: 0; overflow: hidden; display: flex; flex-direction: column;
  transition: width 0.25s cubic-bezier(0.4,0,0.2,1);
}
.detail-panel.closed { width: 0; border-left: none; }
.panel-inner { width: 334px; height: 100%; overflow-y: auto; flex-shrink: 0; }

.prop-photo { position: relative; height: 172px; background: var(--navy-800); overflow: hidden; flex-shrink: 0; }
.prop-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0.75; }
.photo-fade {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 30%, var(--navy-900) 100%);
}
.photo-badge {
  position: absolute; top: 10px; right: 10px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
  padding: 4px 10px; border-radius: 4px;
}
.back-btn {
  position: absolute; top: 10px; left: 10px;
  background: rgba(7,17,28,0.8); border: 1px solid var(--navy-700);
  color: var(--sl-400); width: 28px; height: 28px; border-radius: 6px;
  cursor: pointer; font-size: 15px; display: flex;
  align-items: center; justify-content: center; font-family: inherit;
}
.back-btn:hover { color: var(--sl-200); }
.photo-addr { position: absolute; bottom: 12px; left: 14px; right: 14px; }
.photo-addr .addr-main { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.3; }
.photo-addr .addr-sub  { font-size: 12px; color: var(--sl-400); margin-top: 2px; }

.panel-content { padding: 16px 16px 0; }

/* MAX BID hero */
.max-bid-box {
  padding: 18px 16px; border-radius: 10px; margin-bottom: 14px;
  background: rgba(30,58,95,0.15); border: 1px solid var(--navy-600);
}
.max-bid-label {
  font-size: 10px; color: var(--navy-400); letter-spacing: 0.12em;
  text-transform: uppercase; font-weight: 600; margin-bottom: 6px;
}
.max-bid-number {
  font-size: 42px; font-weight: 800; color: var(--orange);
  letter-spacing: -0.02em; line-height: 1;
}
.max-bid-formula {
  font-size: 11px; color: var(--sl-700); margin-top: 8px;
}

/* Metrics table */
.metrics { margin-bottom: 14px; }
.metric-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid rgba(22,45,74,0.25);
}
.metric-label { font-size: 12px; color: var(--sl-600); }
.metric-val { font-size: 12px; font-weight: 700; color: var(--sl-300); }
.metric-val.warn { color: var(--review); }

/* Reasoning box */
.reasoning {
  padding: 13px 14px; margin-bottom: 16px;
  background: var(--navy-800); border: 1px solid var(--navy-700); border-radius: 8px;
}
.reasoning-label {
  font-size: 10px; color: var(--navy-400); letter-spacing: 0.1em;
  text-transform: uppercase; font-weight: 600; margin-bottom: 8px;
}
.reasoning-text { font-size: 12.5px; color: var(--sl-500); line-height: 1.65; }

/* Panel footer */
.panel-footer {
  padding: 10px 16px; border-top: 1px solid rgba(22,45,74,0.25);
  display: flex; justify-content: space-between; flex-shrink: 0;
  font-size: 10px; color: var(--navy-700);
}

/* Message animation */
@keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.msg-anim { animation: msgIn 0.2s ease both; }

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width: 900px) {
  .detail-panel { position: fixed; right: 0; top: 54px; bottom: 0; z-index: 50; }
  .detail-panel.closed { width: 0; }
  .sidebar { width: 180px; }
}
@media (max-width: 640px) {
  .sidebar { display: none; }
  .everest-tag { display: none; }
}
</style>
</head>

/* ── DOM REFS ─────────────────────────────────────────────── */

/* ── RENDER SIDEBAR ───────────────────────────────────────── */

    const isActive = p.id === activeId;
    const street = p.address.split(",")[0];
    const city   = p.city.split(",")[0];
    return `<button class="prop-row${isActive ? " active" : ""}"
      style="--row-color:${c.color}"
      onclick="selectProp('${p.id}')">
      <div class="prop-row-top">
        <span class="prop-row-addr">${street}</span>
        <span class="prop-row-dec" style="color:${c.color}">${p.decision}</span>
      </div>
      <div class="prop-row-bot">
        <span class="prop-row-city">${city}</span>
        <span class="prop-row-bid">$${p.maxBid.toLocaleString()}</span>
      </div>
    </button>`;
  }).join("");
}

/* ── ANIMATED COUNTER ─────────────────────────────────────── */
function animateCounter(el, target, duration = 850) {
  if (counterRaf) cancelAnimationFrame(counterRaf);
  const start = 0, t0 = performance.now();
  const tick = (now) => {
    const progress = Math.min((now - t0) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = "$" + Math.round(start + (target - start) * eased).toLocaleString();
    if (progress < 1) counterRaf = requestAnimationFrame(tick);
  };
  counterRaf = requestAnimationFrame(tick);
}

/* ── RENDER DETAIL PANEL ──────────────────────────────────── */
function renderPanel() {
  const p = PROPERTIES.find(x => x.id === activeId);
  if (!p) return;
  const c = DCFG[p.decision];

  const rows = [
    { label: "Market Value", val: p.market ? `$${p.market.toLocaleString()}` : "—", warn: false },
    { label: "Judgment",     val: p.judgment ? `$${p.judgment.toLocaleString()}` : "Missing ⚠", warn: !p.judgment },
    { label: "AVM",          val: p.avm ? `$${p.avm.toLocaleString()}` : "—", warn: false },
    { label: "Last Sale",    val: p.lastSale ? `$${p.lastSale.toLocaleString()}` : "—", warn: false },
    { label: "Opening Bid",  val: p.opening ? `$${p.opening.toLocaleString()}` : "—", warn: false },
    { label: "Bid / MV",     val: p.ratio ? `${p.ratio}%` : "—", warn: p.ratio > 100 },
    { label: "Annual Tax",   val: p.taxes ? `$${p.taxes.toLocaleString()}` : "—", warn: false },
  ].filter(r => r.val !== "—");

  const details = [
    p.type,
    p.beds > 0 ? `${p.beds}bd/${p.baths}ba` : null,
    p.sqft ? `${p.sqft.toLocaleString()} sqft` : null,
    p.year ? `Built ${p.year}` : null,
  ].filter(Boolean).join(" · ");

  $inner.innerHTML = `
    <div class="prop-photo">
      <img src="${p.photo}" alt="${p.address}" onerror="this.style.display='none'">
      <div class="photo-fade"></div>
      <button class="back-btn" onclick="closePanel()">‹</button>
      <div class="photo-badge" style="background:${c.bg};border:1px solid ${c.border};color:${c.color}">${p.decision}</div>
      <div class="photo-addr">
        <div class="addr-main">${p.address}</div>
        <div class="addr-sub">${p.city}${details ? " · " + details : ""}</div>
      </div>
    </div>

    <div class="panel-content">
      <div class="max-bid-box">
        <div class="max-bid-label">Max Bid · Everest Formula</div>
        <div class="max-bid-number" id="counter-display">$0</div>
        <div class="max-bid-formula">(ARV × 70%) − Repairs − $10K − MIN($25K, 15%ARV)</div>
      </div>

      <div class="metrics">
        ${rows.map(r => `
          <div class="metric-row">
            <span class="metric-label">${r.label}</span>
            <span class="metric-val${r.warn ? " warn" : ""}">${r.val}</span>
          </div>`).join("")}
      </div>

      <div class="reasoning">
        <div class="reasoning-label">AI Reasoning</div>
        <div class="reasoning-text">${p.reason}</div>
      </div>
    </div>

    <div class="panel-footer">
      <span>${p.caseNo}</span>
      <span>${p.date}</span>
    </div>`;

  // Animate counter after render
  requestAnimationFrame(() => {
    const el = document.getElementById("counter-display");
    if (el) animateCounter(el, p.maxBid);
  });
}

/* ── SELECT PROPERTY ──────────────────────────────────────── */
function selectProp(id) {
  activeId = id;
  panelOpen = true;
  $panel.classList.remove("closed");
  renderSidebar();
  renderPanel();
}

function closePanel() {
  panelOpen = false;
  $panel.classList.add("closed");
}

/* ── RENDER CHIPS ─────────────────────────────────────────── */
function renderChips() {
  $chips.innerHTML = CHIPS.map(c =>
    `<button class="chip" onclick="sendMsg('${c.replace(/'/g,"\\'")}')">` + c + `</button>`
  ).join("");
}

/* ── RENDER MESSAGES ──────────────────────────────────────── */
function renderBubble(role, text, animate = false) {
  const isUser = role === "user";
  const el = document.createElement("div");
  el.className = `message${isUser ? " user" : ""}${animate ? " msg-anim" : ""}`;

  const formattedText = text
    .split("\n")
    .map(line => {
      return line
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/`([^`]+)`/g, `<code>$1</code>`);
    })
    .map((line, i, arr) => line === "" ? "<br>" : line)
    .join("<br>");

  el.innerHTML = `
    <div class="avatar ${isUser ? "avatar-user" : "avatar-ai"}">${isUser ? "A" : "BD"}</div>
    <div class="bubble ${isUser ? "bubble-user" : "bubble-ai"}">${formattedText}</div>`;
  $msgs.appendChild(el);
  $msgs.scrollTop = $msgs.scrollHeight;
  return el;
}

function showTyping() {
  const el = document.createElement("div");
  el.className = "message msg-anim";
  el.id = "typing-indicator";
  el.innerHTML = `
    <div class="avatar avatar-ai">BD</div>
    <div class="bubble bubble-ai">
      <div class="typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  $msgs.appendChild(el);
  $msgs.scrollTop = $msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

/* ── AUTO-DETECT PROPERTY IN TEXT ─────────────────────────── */
function detectProp(text) {
  const lo = text.toLowerCase();
  for (const p of PROPERTIES) {
    const street = p.address.toLowerCase().replace(/^\d+\s+/, "").replace(/\s+(ne|nw|se|sw)$/i, "");
    const city   = p.city.split(",")[0].toLowerCase();
    if (lo.includes(street) || lo.includes(city)) {
      selectProp(p.id);
      return;
    }
  }
}

/* ── SEND MESSAGE ─────────────────────────────────────────── */
async function sendMsg(text) {
  const content = (text || $input.value).trim();
  if (!content || loading) return;
  $input.value = "";
  autoResize();
  loading = true;
  $sendBtn.disabled = true;

  // Detect property in user message
  detectProp(content);

  messages.push({ role: "user", content });
  renderBubble("user", content, true);
  showTyping();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages })
    });
    const data = await res.json();
    removeTyping();

    if (data.success && data.response) {
      messages.push({ role: "assistant", content: data.response });
      renderBubble("assistant", data.response, true);
      detectProp(data.response);
    } else {
      renderBubble("assistant", "Connection error — check Cloudflare Function logs.", true);
    }
  } catch (err) {
    removeTyping();
    renderBubble("assistant", `Error: ${err.message}`, true);
  }

  loading = false;
  $sendBtn.disabled = !$input.value.trim();
}

/* ── INPUT HANDLING ───────────────────────────────────────── */
function autoResize() {
  $input.style.height = "auto";
  $input.style.height = Math.min($input.scrollHeight, 120) + "px";
}

$input.addEventListener("input", () => {
  autoResize();
  $sendBtn.disabled = !$input.value.trim();
});

$input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

$sendBtn.addEventListener("click", () => sendMsg());

/* ── INIT ─────────────────────────────────────────────────── */
function init() {
  renderSidebar();
  renderChips();
  renderPanel();

  // Welcome message
  const welcome = "**Brevard County Auction — March 4, 2026**\n\n5 properties analyzed. Results: **0 BID · 2 REVIEW · 3 SKIP**\n\nTop picks: Guldahl Dr in Titusville (strongest AVM gap) and Crestview St in Palm Bay. Select any property in the sidebar or ask me anything.";
  messages.push({ role: "assistant", content: welcome });
  renderBubble("assistant", welcome);
}

init();
</script>
</body>
