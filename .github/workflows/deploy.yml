name: Deploy BidDeed Conversational AI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Resolve Cloudflare Account ID from token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          # Fetch account ID from CF API using the token
          ACCOUNT_ID=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts?per_page=1" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])")
          echo "CF_ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
          echo "✅ Resolved account ID: ${ACCOUNT_ID:0:8}..."

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
        run: |
          wrangler pages deploy public \
            --project-name=biddeed-conversational-ai \
            --branch=main

      - name: Verify live deployment
        run: |
          sleep 15
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://biddeed-conversational-ai.pages.dev/chat)
          echo "HTTP $CODE → https://biddeed-conversational-ai.pages.dev/chat"
          [ "$CODE" = "200" ] && echo "✅ V3 house brand LIVE" || (echo "❌ Unexpected status" && exit 1)
