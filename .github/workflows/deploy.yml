name: Deploy BidDeed Conversational AI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: biddeed-conversational-ai
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Verify deployment
        run: |
          sleep 10
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://biddeed-conversational-ai.pages.dev/chat)
          echo "HTTP $CODE → https://biddeed-conversational-ai.pages.dev/chat"
          [ "$CODE" = "200" ] && echo "✅ Live" || echo "⚠ Check Cloudflare dashboard"
